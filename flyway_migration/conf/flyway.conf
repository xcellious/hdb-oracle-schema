# Connection and Credential settings are now managed via the .env file.
# Please copy .env.example to .env and fill in your details.
# FLYWAY_URL, FLYWAY_USER, FLYWAY_PASSWORD, etc.

flyway.jdbcProperties.internal_logon=sysdba
flyway.schemas=HDBDBA,DECODES,PSSWD_USER,APP_USER
flyway.oracle.sqlplus=false
flyway.baselineOnMigrate=true
flyway.locations=filesystem:flyway_migration/sql/base
flyway.table=flyway_schema_history
flyway.sqlMigrationPrefix=V
flyway.outOfOrder=true
